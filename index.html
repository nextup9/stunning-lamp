<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stunning Lamp</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      margin: 0;
      background: #f8f9fb;
      color: #222;
    }
    header {
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      padding: 2.5rem 1rem 1.5rem 1rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    header h1 {
      margin: 0 0 0.5rem 0;
      font-size: 2.4rem;
      letter-spacing: 0.12em;
    }
    header p {
      font-size: 1.25rem;
      margin: 0;
      opacity: 0.88;
    }
    section {
      margin: 2rem auto;
      max-width: 700px;
      padding: 0 1.2rem;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .feature-item {
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      padding: 1.25rem 1rem;
      min-width: 180px;
      max-width: 220px;
      flex: 1 1 160px;
      text-align: center;
    }
    .feature-item h3 {
      margin-top: 0;
      font-size: 1.15rem;
    }
    a.github-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #24292e;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    a.github-link:hover {
      background: #0054d6;
    }
    footer {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem 1rem;
      color: #7a7a7a;
      font-size: 0.95em;
    }
    @media(max-width: 500px) {
      header h1 { font-size: 1.5rem; }
      .features { flex-direction: column; gap: 0.5rem; }
      .feature-item { max-width: none;}
    }
  </style>
</head>
<body>
  <header>
    <h1>Stunning Lamp</h1>
    <p>my project</p>
  </header>
  <section>
    <h2>项目简介</h2>
    <p>欢迎访问 Stunning Lamp，这是一个开源项目，致力于探索和实现更酷的创意。</p>
    <h2>特性</h2>
    <div class="features">
      <div class="feature-item">
        <h3>开箱即用</h3>
        <p>简单部署，快速体验核心功能。</p>
      </div>
      <div class="feature-item">
        <h3>简洁美观</h3>
        <p>现代风格界面设计，兼容移动端。</p>
      </div>
      <div class="feature-item">
        <h3>开源共享</h3>
        <p>欢迎贡献你的想法与代码。</p>
      </div>
    </div>
    <div style="text-align:center">
      <a class="github-link" href="https://github.com/nextup9/stunning-lamp" target="_blank">
        查看 GitHub 仓库
      </a>
    </div>
  </section>
  <footer>
    &copy; 2026 nextup9 / Stunning Lamp &mdash; 由 <a href="https://github.com/nextup9" style="color: #7a7a7a;" target="_blank">nextup9</a> 维护
  </footer>
</body>
</html>
